<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>extra-hands</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <svg class="logo-mark" width="11" height="14" viewBox="0 0 18 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0.5"  y="10" width="4" height="10" rx="2" fill="currentColor"/>
        <rect x="7"    y="4"  width="4" height="16" rx="2" fill="currentColor"/>
        <rect x="13.5" y="7"  width="4" height="13" rx="2" fill="currentColor"/>
      </svg>
      <span class="logo-text">extra<span class="logo-hyphen">-</span>hands</span>
    </div>
    <div class="header-right">
      <button id="theme-btn" class="hdr-btn" title="Toggle theme">
        <svg id="theme-icon-moon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 9.5a5.5 5.5 0 1 1-6.5-6.5 4.5 4.5 0 0 0 6.5 6.5z"/>
        </svg>
        <svg id="theme-icon-sun" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="8" cy="8" r="3"/>
          <line x1="8" y1="1" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="15"/>
          <line x1="1" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="15" y2="8"/>
        </svg>
      </button>
      <button id="history-btn" class="hdr-btn" title="Thread history">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6.5"/>
          <polyline points="8 4.5 8 8 10.5 9.5"/>
        </svg>
      </button>
      <button id="new-btn" class="hdr-btn hdr-btn--text" title="New task">new</button>
      <button id="settings-btn" class="hdr-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Settings panel ──────────────────────────────────────────────────── -->
  <div id="settings-bar" class="settings-panel">
    <div class="sp-row">
      <span class="sp-label">model</span>
      <select id="model-select"></select>
    </div>
    <div class="sp-row">
      <span class="sp-label">api key</span>
      <input type="password" id="api-key-input" placeholder="sk-or-..." autocomplete="off" spellcheck="false" />
      <button id="save-key-btn">save</button>
    </div>
  </div>

  <!-- ── History panel (slide-in overlay) ───────────────────────────────── -->
  <div id="history-panel" class="history-panel" aria-hidden="true">
    <div class="history-header">
      <span class="history-title">threads</span>
      <button id="history-close-btn" class="icon-btn" title="Close">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/>
        </svg>
      </button>
    </div>
    <div class="history-search-wrap">
      <input id="history-search" class="history-search" type="search" placeholder="search threads…" autocomplete="off" spellcheck="false" />
    </div>
    <div id="history-list" class="history-list"></div>
    <div id="history-empty" class="history-empty" style="display:none">no threads yet</div>
  </div>
  <div id="history-backdrop" class="history-backdrop" aria-hidden="true"></div>

  <!-- ── Home view ───────────────────────────────────────────────────────── -->
  <div id="view-home" class="view">

    <!-- Hero -->
    <div class="home-hero">
      <p class="home-tagline">put me to work.</p>
      <p class="home-sub">point me at a folder · describe a task · step away</p>
    </div>

    <!-- Task cards -->
    <div class="home-cards">
      <button class="task-card" data-task="Scrape product prices from a website and save them as a CSV">
        <span class="task-card-label">extract</span>
        <span class="task-card-title">Scrape data to CSV</span>
      </button>
      <button class="task-card" data-task="Write a Python script to convert all CSVs in my folder to PDF">
        <span class="task-card-label">transform</span>
        <span class="task-card-title">Convert files in a folder</span>
      </button>
      <button class="task-card" data-task="Research and write a briefing doc on [topic], pulling in sources from the web">
        <span class="task-card-label">research</span>
        <span class="task-card-title">Write a briefing doc</span>
      </button>
    </div>

    <!-- Compose -->
    <div class="compose-area">
      <div class="compose-input-wrap">
        <textarea id="task-input" class="task-textarea" placeholder="Describe a task…" rows="4" spellcheck="true"></textarea>
        <button id="run-btn" class="send-btn" disabled aria-label="Run task">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 12V4M4 8l4-4 4 4"/>
          </svg>
        </button>
      </div>

      <div class="compose-footer">
        <button id="pick-folder-btn" class="workspace-btn">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h3.44l1.5 2H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5z"/>
          </svg>
          <span id="workspace-path" class="workspace-path">no folder selected</span>
        </button>
        <span id="compose-hint" class="compose-hint"></span>
      </div>
    </div>

  </div>

  <!-- ── Thread / agent view ─────────────────────────────────────────────── -->
  <div id="view-thread" class="view" style="display:none">

    <div class="thread-header">
      <button id="back-btn" class="back-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="10 3 3 8 10 13"/>
        </svg>
        back
      </button>
      <span id="thread-status-badge" class="status-badge"></span>
    </div>

    <div class="thread-task-title" id="thread-task-title"></div>

    <div id="agent-feed" class="agent-feed"></div>

    <div id="permission-prompt" class="permission-prompt" style="display:none">
      <div class="perm-info">
        <svg class="perm-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="7" width="10" height="8" rx="1.5"/>
          <path d="M5 7V5a3 3 0 0 1 6 0v2"/>
        </svg>
        <span id="perm-tool" class="perm-tool"></span>
      </div>
      <div id="perm-path" class="perm-path"></div>
      <div class="perm-actions">
        <button id="perm-deny-btn" class="perm-btn perm-btn--deny">deny</button>
        <button id="perm-allow-btn" class="perm-btn">allow</button>
        <button id="perm-always-btn" class="perm-btn perm-btn--always">always this folder</button>
      </div>
    </div>

    <div id="agent-result" class="agent-result" style="display:none">
      <div class="result-label">result</div>
      <div id="result-content" class="result-content"></div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
